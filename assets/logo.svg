<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <!-- Gradient for the icon -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B365D"/>
      <stop offset="50%" style="stop-color:#2E86AB"/>
      <stop offset="100%" style="stop-color:#4CAF50"/>
    </linearGradient>

    <!-- Subtle glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gradient for the forward arrow/transformation element -->
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2E86AB"/>
      <stop offset="100%" style="stop-color:#4CAF50"/>
    </linearGradient>
  </defs>

  <!-- === ICON: Abstract "P" merged with forward-moving transformation arrows === -->
  <g transform="translate(30, 20)">
    <!-- Outer hexagonal shield shape - represents reliability/protection -->
    <path d="M75 8 L132 40 L132 104 L75 136 L18 104 L18 40 Z"
          fill="none" stroke="url(#iconGrad)" stroke-width="3" opacity="0.15"/>

    <!-- Main "P" letterform - bold, geometric -->
    <path d="M45 30 L45 115" stroke="#1B365D" stroke-width="10" stroke-linecap="round"/>

    <!-- "P" bowl - opens forward, suggesting forward movement -->
    <path d="M45 30 L80 30 Q110 30 110 55 Q110 75 85 78"
          fill="none" stroke="#1B365D" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Three forward-moving lines emerging from P - representing transformation/transition -->
    <g filter="url(#glow)">
      <!-- Line 1 - top -->
      <line x1="88" y1="42" x2="130" y2="42" stroke="url(#arrowGrad)" stroke-width="4" stroke-linecap="round"/>
      <polygon points="130,36 142,42 130,48" fill="#4CAF50"/>

      <!-- Line 2 - middle (longest, most prominent) -->
      <line x1="92" y1="58" x2="140" y2="58" stroke="url(#arrowGrad)" stroke-width="5" stroke-linecap="round"/>
      <polygon points="140,51 154,58 140,65" fill="#4CAF50"/>

      <!-- Line 3 - bottom -->
      <line x1="85" y1="74" x2="125" y2="74" stroke="url(#arrowGrad)" stroke-width="4" stroke-linecap="round"/>
      <polygon points="125,68 137,74 125,80" fill="#4CAF50"/>
    </g>

    <!-- Small circuit/node dots - representing AI/technology -->
    <circle cx="45" cy="30" r="4" fill="#1B365D"/>
    <circle cx="45" cy="115" r="4" fill="#1B365D"/>

    <!-- Data nodes floating near arrows -->
    <circle cx="108" cy="42" r="2.5" fill="#2E86AB"/>
    <circle cx="115" cy="58" r="2.5" fill="#2E86AB"/>
    <circle cx="104" cy="74" r="2.5" fill="#2E86AB"/>
  </g>

  <!-- === WORDMARK === -->
  <g transform="translate(200, 0)">
    <!-- "PROXIANT" in custom lettering -->
    <text x="0" y="92" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-size="72" font-weight="700" letter-spacing="4" fill="#1B365D">
      PROX<tspan fill="url(#arrowGrad)">I</tspan>ANT
    </text>

    <!-- "AI" badge - subtle, integrated -->
    <rect x="490" y="58" rx="4" ry="4" width="42" height="28" fill="url(#arrowGrad)" opacity="0.9"/>
    <text x="511" y="79" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-size="18" font-weight="700" fill="white" text-anchor="middle">AI</text>

    <!-- Tagline -->
    <text x="2" y="128" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-size="16" font-weight="400" letter-spacing="3.5" fill="#2E86AB">
      THE PROFESSIONALS BEHIND YOUR AI TRANSITION
    </text>

    <!-- Subtle underline accent -->
    <line x1="0" y1="108" x2="535" y2="108" stroke="url(#arrowGrad)" stroke-width="1.5" opacity="0.3"/>
  </g>
</svg>