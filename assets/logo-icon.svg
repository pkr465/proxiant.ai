<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B365D"/>
      <stop offset="50%" style="stop-color:#2E86AB"/>
      <stop offset="100%" style="stop-color:#4CAF50"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2E86AB"/>
      <stop offset="100%" style="stop-color:#4CAF50"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1B365D"/>

  <!-- Inner subtle ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="white" stroke-width="0.5" opacity="0.1"/>

  <!-- Main "P" letterform - white on dark -->
  <path d="M60 50 L60 150" stroke="white" stroke-width="12" stroke-linecap="round"/>

  <!-- "P" bowl -->
  <path d="M60 50 L100 50 Q135 50 135 78 Q135 102 105 105"
        fill="none" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Three forward arrows - the transformation motif -->
  <g filter="url(#glow)">
    <line x1="110" y1="62" x2="150" y2="62" stroke="url(#arrowGrad)" stroke-width="5" stroke-linecap="round"/>
    <polygon points="150,55 164,62 150,69" fill="#4CAF50"/>

    <line x1="116" y1="80" x2="158" y2="80" stroke="url(#arrowGrad)" stroke-width="6" stroke-linecap="round"/>
    <polygon points="158,72 174,80 158,88" fill="#4CAF50"/>

    <line x1="108" y1="98" x2="145" y2="98" stroke="url(#arrowGrad)" stroke-width="5" stroke-linecap="round"/>
    <polygon points="145,91 159,98 145,105" fill="#4CAF50"/>
  </g>

  <!-- Node dots -->
  <circle cx="60" cy="50" r="5" fill="white"/>
  <circle cx="60" cy="150" r="5" fill="white"/>
  <circle cx="130" cy="62" r="3" fill="#2E86AB"/>
  <circle cx="138" cy="80" r="3" fill="#2E86AB"/>
  <circle cx="126" cy="98" r="3" fill="#2E86AB"/>
</svg>