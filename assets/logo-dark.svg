<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3A8FBF"/>
      <stop offset="100%" style="stop-color:#4CAF50"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2E86AB"/>
      <stop offset="100%" style="stop-color:#4CAF50"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="800" height="200" fill="#0A1628"/>

  <!-- === ICON === -->
  <g transform="translate(30, 20)">
    <!-- Hexagonal shield outline -->
    <path d="M75 8 L132 40 L132 104 L75 136 L18 104 L18 40 Z"
          fill="none" stroke="url(#iconGrad)" stroke-width="2" opacity="0.2"/>

    <!-- Main "P" - white -->
    <path d="M45 30 L45 115" stroke="white" stroke-width="10" stroke-linecap="round"/>
    <path d="M45 30 L80 30 Q110 30 110 55 Q110 75 85 78"
          fill="none" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Forward arrows -->
    <g filter="url(#glow)">
      <line x1="88" y1="42" x2="130" y2="42" stroke="url(#arrowGrad)" stroke-width="4" stroke-linecap="round"/>
      <polygon points="130,36 142,42 130,48" fill="#4CAF50"/>

      <line x1="92" y1="58" x2="140" y2="58" stroke="url(#arrowGrad)" stroke-width="5" stroke-linecap="round"/>
      <polygon points="140,51 154,58 140,65" fill="#4CAF50"/>

      <line x1="85" y1="74" x2="125" y2="74" stroke="url(#arrowGrad)" stroke-width="4" stroke-linecap="round"/>
      <polygon points="125,68 137,74 125,80" fill="#4CAF50"/>
    </g>

    <!-- Nodes -->
    <circle cx="45" cy="30" r="4" fill="white"/>
    <circle cx="45" cy="115" r="4" fill="white"/>
    <circle cx="108" cy="42" r="2.5" fill="#2E86AB"/>
    <circle cx="115" cy="58" r="2.5" fill="#2E86AB"/>
    <circle cx="104" cy="74" r="2.5" fill="#2E86AB"/>
  </g>

  <!-- === WORDMARK (white on dark) === -->
  <g transform="translate(200, 0)">
    <text x="0" y="92" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-size="72" font-weight="700" letter-spacing="4" fill="white">
      PROX<tspan fill="url(#arrowGrad)">I</tspan>ANT
    </text>

    <!-- AI badge -->
    <rect x="490" y="58" rx="4" ry="4" width="42" height="28" fill="url(#arrowGrad)" opacity="0.9"/>
    <text x="511" y="79" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-size="18" font-weight="700" fill="white" text-anchor="middle">AI</text>

    <!-- Tagline -->
    <text x="2" y="128" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-size="16" font-weight="400" letter-spacing="3.5" fill="#2E86AB">
      THE PROFESSIONALS BEHIND YOUR AI TRANSITION
    </text>

    <!-- Accent line -->
    <line x1="0" y1="108" x2="535" y2="108" stroke="url(#arrowGrad)" stroke-width="1.5" opacity="0.25"/>
  </g>
</svg>